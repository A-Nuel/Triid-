<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Triid - Artisan Verification & Smart Procurement</title>
    <meta name="description" content="Triid is an artisan verification and smart-procurement platform for gated mega-communities, offering emergency dispatch and scheduled bookings with secure escrow." />
    <meta name="application-name" content="Triid">
    <meta name="theme-color" content="#0F172A">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      body, html {
        margin: 0;
        padding: 0;
        background-color: #0F172A; /* Match the dark teal layout */
        height: 100%;
      }
      #loader-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
        background-color: #0F172A; /* Match the dark teal layout */
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      /* Logo container */
      .loader-logo-container {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(2, 132, 199, 0.4));
        border: 1px solid rgba(56, 189, 248, 0.3);
      }
      .loader-logo-container::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 20%;
        border: 1px solid rgba(56, 189, 248, 0.2);
        transform: rotate(45deg);
      }
      .loader-logo-container::after {
        content: '';
        position: absolute;
        width: 120%;
        height: 120%;
        border-radius: 50%;
        border: 1px solid rgba(56, 189, 248, 0.1);
      }
      .loader-logo-icon {
        width: 28px;
        height: 28px;
        color: #fff;
        z-index: 10;
      }
      /* Text */
      .loader-title {
        margin-top: 24px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .loader-subtitle {
        margin-top: 12px;
        font-size: 14px;
        color: #94A3B8;
        text-align: center;
        line-height: 1.5;
      }
      /* Dots animation */
      .loader-dots {
        position: absolute;
        bottom: 64px;
        display: flex;
        gap: 8px;
      }
      .dot {
        width: 8px;
        height: 8px;
        background-color: #38BDF8;
        border-radius: 50%;
        opacity: 0.3;
        animation: pulse 1.5s infinite ease-in-out;
      }
      .dot:nth-child(1) { animation-delay: 0s; }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Fast initial shell loader before React hydration -->
      <div id="loader-wrapper">
        <div class="loader-logo-container">
          <svg class="loader-logo-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="14" x="2" y="7" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </div>
        <div class="loader-title">Triid</div>
        <div class="loader-subtitle">Trusted artisans. Fast dispatch.<br/>Every time.</div>
        
        <div class="loader-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
